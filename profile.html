<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Client Profile</title>
    <style>
        body { font-family: sans-serif; background: #0b1220; color: white; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; }
        .row { border-bottom: 1px solid #334155; padding: 10px 0; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <button onclick="window.history.back()">Back</button>
    <div class="card">
        <h2>Client Details</h2>
        <div id="details">Loading...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAf79JVQOwBC6NXzTpJvg6DgZFM9A3gtz8",
            authDomain: "vdta-solutions7.firebaseapp.com",
            projectId: "vdta-solutions7",
            appId: "1:440787032300:web:326b66d60acae019baadc9"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const params = new URLSearchParams(window.location.search);
        const phone = params.get('phone');

        async function loadData() {
            try {
                // CHANGE 'clients' BELOW IF YOUR COLLECTION NAME IS DIFFERENT
                const docRef = doc(db, "clients", phone);
                const snap = await getDoc(docRef);

                if (snap.exists()) {
                    const d = snap.data();
                    document.getElementById("details").innerHTML = `
                        <div class="row"><b>Name:</b> ${d.Name || 'N/A'}</div>
                        <div class="row"><b>Number:</b> ${d.Number || 'N/A'}</div>
                        <div class="row"><b>Address:</b> ${d.Address || 'N/A'}</div>
                        <div class="row"><b>PAN:</b> ${d.Pancard || 'N/A'}</div>
                        <div class="row"><b>DOB:</b> ${d.DOB || 'N/A'}</div>
                        <div class="row"><b>Account:</b> ${d.AccountNo || 'N/A'}</div>
                        <div class="row"><b>Bank:</b> ${d.BankName || 'N/A'}</div>
                        <div class="row"><b>Pending:</b> ${d.AmountPending || 'N/A'}</div>
                        <div class="row"><b>Status:</b> ${d.PaymentStatus || 'N/A'}</div>
                    `;
                } else {
                    document.getElementById("details").innerHTML = 
                    "Client not found. Make sure your Collection is named 'clients' and the Document ID is '" + phone + "'.";
                }
            } catch (e) {
                document.getElementById("details").innerHTML = "Error: " + e.message;
            }
        }
        loadData();
    </script>
</body>
</html>
