<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VData Solutions | Client Portal</title>
    <style>
        /* ... (Keep your existing styles from before) ... */
        .secure-badge { 
            background: #d1e7dd; color: #0f5132; padding: 10px; 
            text-align: center; border-radius: 6px; font-weight: bold; 
            margin-bottom: 20px; font-size: 0.9rem; display: flex; 
            align-items: center; justify-content: center; gap: 8px;
        }
        .icon { width: 18px; height: 18px; fill: currentColor; }
    </style>
</head>
<body>

<div class="container">
    <div class="brand">
        <h1>VData Solutions</h1>
        <p>Client Investment Portal</p>
    </div>

    <!-- Authenticity Badge with Logo -->
    <div class="secure-badge">
        <svg class="icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
        100% Authentic & Secure
    </div>

    <div id="profileDetails">Loading...</div>

    <div class="footer-note">
        * Note: Payments may be subject to minor delays. Please note that Sundays are not counted as active investment days.
    </div>

    <button onclick="logout()">Logout</button>
</div>

<script>
    const clientDatabase = {
        "7016437834": {
            "Full Name": "Belim Mahammad Husen",
            "DOB": "16-09-1986",
            "PAN Card": "BAZPN9224M",
            "Bank": "Central Bank of India",
            "Account": "3664783585",
            "Amount": "5,86,990/-",
            "Status": "Completed 80%"
        },
        "9925786588": {
            "Full Name": "Azim Kalaniya",
            "Reference": "Sahil Shekh/Salman Saiyed",
            "Investment Date": "22/06/2026",
            "Investment Amount": "4000/-",
            "Net Profit": "30000/-",
            "Reference Benefit": "200/-",
            "Withdrawal Date": "25/06/2026",
            "UPI": "shekhimranbhai@kotakbank"
        },
        "9574479931": {
            "Full Name": "Salman Saiyed",
            "Reference": "Imran Pathan",
            "Investment Date": "15/06/2026",
            "Investment Amount": "25000/-",
            "Net Profit": "24000/-",
            "Reference Benefits": "1000/-",
            "Withdrawal Date": "30/06/2026",
            "UPI": "9574479931@ptaxis"
        }
    };

    let rawPhone = localStorage.getItem('userPhone') || "";
    let cleanPhone = rawPhone.replace(/\D/g, '').slice(-10);
    const displayElement = document.getElementById('profileDetails');

    if (cleanPhone && clientDatabase[cleanPhone]) {
        const data = clientDatabase[cleanPhone];
        let html = '<div class="grid">';
        for (let key in data) {
            html += `<div class="field ${key === 'Full Name' ? 'full' : ''}">
                        <span class="label">${key}</span>
                        <span class="value">${data[key]}</span>
                     </div>`;
        }
        html += '</div>';
        displayElement.innerHTML = html;
    } else {
        displayElement.innerHTML = "<p>No profile found.</p>";
    }

    function logout() {
        localStorage.removeItem('userPhone');
        window.location.href = "index.html";
    }
</script>
</body>
</html>
