<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Client Profile</title>
    <style>
        body { font-family: sans-serif; background: #f8fafc; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        .table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .table td { border: 1px solid #ddd; padding: 10px; }
        .header { display: flex; justify-content: space-between; align-items: center; }
        button { padding: 8px 15px; background: #ef4444; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2>Client Profile</h2>
        <button onclick="logout()">Logout</button>
    </div>
    <div id="profileDetails">Loading...</div>
</div>

<script>
    const clientDatabase = {
        "7016437834": {
            "Full Name": "Belim Mahammad Husen",
            "DOB": "16-09-1986",
            "PAN Card": "BAZPN9224M",
            "Bank": "Central Bank of India",
            "Account": "3664783585",
            "Amount": "5,86,990/-",
            "Payment Status": "Completed 80%"
        },
        "9925786588": {
            "Full Name": "Azim Kalaniya",
            "Reference Name": "Sahil Shekh/Salman Saiyed",
            "Investment Date": "22/06/2026",
            "Investment Amount": "4000/-",
            "Net Profit": "30000/-",
            "Reference Benefit": "2000/-",
            "Withdrawal Date": "25/06/2026",
            "UPI": "shekhimranbhai@kotakbank"
        }
    };

    // THIS IS THE FIX: It cleans the phone number by removing spaces and +91
    let rawPhone = localStorage.getItem('userPhone') || "";
    let cleanPhone = rawPhone.replace(/\D/g, ''); 
    if (cleanPhone.startsWith('91')) cleanPhone = cleanPhone.substring(2);

    const displayElement = document.getElementById('profileDetails');

    if (cleanPhone && clientDatabase[cleanPhone]) {
        const data = clientDatabase[cleanPhone];
        let tableHTML = '<table class="table">';
        for (let key in data) {
            tableHTML += `<tr><td><strong>${key}</strong></td><td>${data[key]}</td></tr>`;
        }
        tableHTML += '</table>';
        displayElement.innerHTML = tableHTML;
    } else {
        displayElement.innerHTML = `<p>No data found for phone number: <b>${rawPhone}</b></p>`;
    }

    function logout() {
        localStorage.removeItem('userPhone');
        window.location.href = "index.html";
    }
</script>
</body>
</html>
