<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Profile | VDTA Solutions</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0b1220; color: white; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; max-width: 500px; margin: auto; }
        .row { border-bottom: 1px solid #334155; padding: 12px 0; display: flex; justify-content: space-between; }
        .row b { color: #60a5fa; }
        .back-btn { background: #64748b; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; margin-bottom: 20px; }
    </style>
</head>
<body>

    <button class="back-btn" onclick="window.history.back()">Back</button>

    <div class="card">
        <h2>Client Details</h2>
        <div id="details">Loading data...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAf79JVQOwBC6NXzTpJvg6DgZFM9A3gtz8",
            authDomain: "vdta-solutions7.firebaseapp.com",
            projectId: "vdta-solutions7",
            appId: "1:440787032300:web:326b66d60acae019baadc9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const params = new URLSearchParams(window.location.search);
        const phone = params.get('phone');

        async function loadData() {
            if (!phone) {
                document.getElementById("details").innerHTML = "No phone number provided.";
                return;
            }

            try {
                const docRef = doc(db, "clients", phone);
                const snap = await getDoc(docRef);

                if (snap.exists()) {
                    const d = snap.data();
                    document.getElementById("details").innerHTML = `
                        <div class="row"><b>Name:</b> <span>${d.Name || 'N/A'}</span></div>
                        <div class="row"><b>Number:</b> <span>${d.Number || 'N/A'}</span></div>
                        <div class="row"><b>Address:</b> <span>${d.Address || 'N/A'}</span></div>
                        <div class="row"><b>PAN Card:</b> <span>${d.Pancard || 'N/A'}</span></div>
                        <div class="row"><b>Date of Birth:</b> <span>${d.DOB || 'N/A'}</span></div>
                        <div class="row"><b>Account No:</b> <span>${d.AccountNo || 'N/A'}</span></div>
                        <div class="row"><b>Bank Name:</b> <span>${d.BankName || 'N/A'}</span></div>
                        <div class="row"><b>Amount Pending:</b> <span>${d.AmountPending || 'N/A'}</span></div>
                        <div class="row"><b>Payment Status:</b> <span>${d.PaymentStatus || 'N/A'}</span></div>
                    `;
                } else {
                    document.getElementById("details").innerHTML = "Client not found. Please verify the number.";
                }
            } catch (error) {
                document.getElementById("details").innerHTML = "Error connecting to database.";
                console.error(error);
            }
        }
        loadData();
    </script>
</body>
</html>
