<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Profile</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; padding: 20px; display: flex; justify-content: center; }
        .form-container { background: white; width: 100%; max-width: 500px; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        h2 { margin: 0; color: #333; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .field { border: 1px solid #ddd; padding: 12px; border-radius: 6px; background-color: #fafafa; }
        .label { font-size: 0.75rem; color: #666; text-transform: uppercase; font-weight: bold; display: block; margin-bottom: 4px; }
        .value { font-size: 1rem; color: #222; font-weight: 500; }
        .full-width { grid-column: span 2; }
        button { background-color: #dc3545; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="form-container">
    <div class="header">
        <h2>Client Profile</h2>
        <button onclick="logout()">Logout</button>
    </div>
    <div id="profileDetails">Loading...</div>
</div>

<script>
    // THE MASTER DATABASE (Now with 3 profiles)
    const clientDatabase = {
        "7016437834": {
            "Full Name": "Belim Mahammad Husen",
            "DOB": "16-09-1986",
            "PAN Card": "BAZPN9224M",
            "Bank": "Central Bank of India",
            "Account": "3664783585",
            "Amount": "5,86,990/-",
            "Payment Status": "Completed 80%"
        },
        "9925786588": {
            "Full Name": "Azim Kalaniya",
            "Reference Name": "Sahil Shekh/Salman Saiyed",
            "Investment Date": "22/06/2026",
            "Investment Amount": "4000/-",
            "Net Profit": "30000/-",
            "Reference Benefit": "200/-",
            "Withdrawal Date": "25/06/2026",
            "UPI": "shekhimranbhai@kotakbank"
        },
        "9574479931": {
            "Full Name": "Salman Saiyed",
            "Reference": "Imran Pathan",
            "Investment Amount": "25000/-",
            "Net Profit": "24000/-",
            "Reference Benefits": "1000/-",
            "Investment Date": "15/06/2026",
            "Withdrawal Date": "30/06/2026"
        }
    };

    // LOGIC
    let rawPhone = localStorage.getItem('userPhone') || "";
    let cleanPhone = rawPhone.replace(/\D/g, '').slice(-10);
    const displayElement = document.getElementById('profileDetails');

    if (cleanPhone && clientDatabase[cleanPhone]) {
        const data = clientDatabase[cleanPhone];
        let html = '<div class="form-row">';
        
        for (let key in data) {
            html += `
                <div class="field ${key === 'Full Name' ? 'full-width' : ''}">
                    <span class="label">${key}</span>
                    <span class="value">${data[key]}</span>
                </div>`;
        }
        html += '</div>';
        displayElement.innerHTML = html;
    } else {
        displayElement.innerHTML = "<p>No profile found. Please login again.</p>";
    }

    function logout() {
        localStorage.removeItem('userPhone');
        window.location.href = "index.html";
    }
</script>

</body>
</html>
