<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <title>VData Solutions | Client Portal</title>
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        body { margin: 0; padding: 20px; font-family: 'Poppins', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #4b0082 0%, #8a2be2 50%, #4b0082 100%); }
        
        /* Menu Styles */
        .menu-btn { position: absolute; top: 20px; left: 20px; font-size: 24px; color: white; cursor: pointer; z-index: 100; }
        .sidebar { height: 100%; width: 0; position: fixed; top: 0; left: 0; background: #222; overflow-x: hidden; transition: 0.3s; padding-top: 60px; z-index: 200; }
        .sidebar a { padding: 15px 25px; text-decoration: none; font-size: 18px; color: #ccc; display: block; transition: 0.3s; border-bottom: 1px solid #333; }
        .sidebar a:hover { color: #ff007f; }
        .close-btn { position: absolute; top: 10px; right: 25px; font-size: 36px; color: white; }

        .container { animation: fadeIn 0.8s ease-out; background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(15px); width: 100%; max-width: 500px; padding: 25px; border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.3); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        .brand-header { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 5px; }
        .brand-title { font-family: 'Great Vibes', cursive; font-size: 2.5rem; color: #ffffff; margin: 0; }
        .divider { height: 2px; background: linear-gradient(90deg, transparent, #ff007f, transparent); margin: 15px 0; border: none; }
        .slogan { text-align: center; color: #f0f0f0; font-size: 0.9rem; margin-bottom: 5px; font-style: italic; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 20px; }
        .field { background: rgba(255, 255, 255, 0.95); padding: 12px; border-radius: 10px; border-left: 5px solid #ff007f; }
        .label { font-size: 0.7rem; color: #555; text-transform: uppercase; font-weight: bold; }
        .value { font-size: 1rem; color: #222; font-weight: 700; display: block; }
        button { background-color: #ff007f; color: white; border: none; width: 100%; padding: 14px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .footer-note { font-size: 0.75rem; color: #eee; margin-top: 20px; text-align: left; line-height: 1.6; }
        .auth-footer { text-align: center; margin-top: 20px; font-size: 0.8rem; color: #fff; opacity: 0.8; }
    </style>
</head>
<body>

    <!-- Menu Section -->
    <div class="menu-btn" onclick="openNav()">☰</div>
    <div id="mySidebar" class="sidebar">
        <a href="javascript:void(0)" class="close-btn" onclick="closeNav()">×</a>
        <a href="#">Register request</a>
        <a href="#">Jobs</a>
        <a href="#">Data entry</a>
        <a href="#">Work from home</a>
        <a href="#">Crypto investment</a>
    </div>

    <div class="container">
        <div class="brand-header">
            <h1 class="brand-title">VData Solutions</h1>
        </div>
        <p class="slogan">Your Growth, Our Commitment.</p>
        <hr class="divider">
        
        <div id="profileDetails">Loading...</div>
        
        <button onclick="logout()">Logout</button>

        <div class="footer-note">
            * Payments sometimes delay.<br>
            * Sundays are not included in investment days.<br>
            * New users must register with the admin.
        </div>
        <div class="auth-footer">🛡️ 100% Authenticated System</div>
    </div>
    
    <script>
        function openNav() { document.getElementById("mySidebar").style.width = "250px"; }
        function closeNav() { document.getElementById("mySidebar").style.width = "0"; }

        const clientDatabase = {
            "9925786588": { "Full Name": "Azim Kalaniya", "Investment Amount": "4000/-", "Net Profit": "3000/-", "UPI": "shekhimranbhai@kotakbank" },
            "9574479931": { "Full Name": "Salman Saiyed", "Investment Amount": "25000/-", "Net Profit": "24000/-", "UPI": "9574479931@ptaxis" }
        };
        let rawPhone = localStorage.getItem('userPhone') || "";
        let cleanPhone = rawPhone.replace(/\D/g, '').slice(-10);
        const displayElement = document.getElementById('profileDetails');
        if (cleanPhone && clientDatabase[cleanPhone]) {
            const data = clientDatabase[cleanPhone];
            let html = '<div class="grid">';
            for (let key in data) { html += `<div class="field"><span class="label">${key}</span><span class="value">${data[key]}</span></div>`; }
            displayElement.innerHTML = html + '</div>';
        } else { displayElement.innerHTML = "<p>No profile found.</p>"; }
        function logout() { localStorage.removeItem('userPhone'); window.location.href = "index.html"; }
    </script>
</body>
</html>
