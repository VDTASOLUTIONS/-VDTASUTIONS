<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <title>VData Solutions | Login</title>
    <style>
        body { margin: 0; padding: 20px; font-family: 'Poppins', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #4b0082 0%, #8a2be2 50%, #4b0082 100%); }
        .login-box { background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); text-align: center; width: 90%; max-width: 400px; }
        
        /* Branding */
        .brand-header { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 5px; }
        .brand-header img { width: 45px; height: 45px; }
        .brand-title { font-family: 'Great Vibes', cursive; font-size: 2.8rem; color: #4b0082; margin: 0; }
        .slogan { color: #555; margin-bottom: 25px; font-style: italic; font-size: 0.9rem; }
        
        /* Features List */
        .features { text-align: left; margin-bottom: 25px; font-size: 0.85rem; color: #444; border-top: 1px solid #eee; padding-top: 15px; }
        .features li { margin-bottom: 8px; list-style: none; }
        .features li::before { content: "✔"; color: #ff007f; margin-right: 10px; font-weight: bold; }
        
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #ff007f; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #d6006a; }
        
        .footer-note { font-size: 0.7rem; color: #888; margin-top: 20px; }
    </style>
</head>
<body>

<div class="login-box">
    <div class="brand-header">
        <img src="logo.png" alt="Logo">
        <h1 class="brand-title">VData Solutions</h1>
    </div>
    <p class="slogan">Your Growth, Our Commitment.</p>

    <ul class="features">
        <li>Real-time investment tracking</li>
        <li>Secure and transparent profit reports</li>
        <li>Instant access to withdrawal status</li>
    </ul>

    <input type="text" id="phoneInput" placeholder="Enter Mobile Number">
    <button onclick="login()">Login to Profile</button>
    
    <p class="footer-note">New users must register via admin.</p>
</div>

<script>
    function login() {
        const phone = document.getElementById('phoneInput').value;
        if (phone.length >= 10) {
            localStorage.setItem('userPhone', phone);
            window.location.href = "profile.html";
        } else {
            alert("Please enter a valid mobile number.");
        }
    }
</script>
</body>
</html>
