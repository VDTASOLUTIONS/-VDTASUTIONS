<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
    <style>
        body { background: #4b0082; color: white; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; gap: 10px; }
        .field { background: white; color: black; padding: 10px; border-radius: 5px; }
        .label { font-size: 10px; text-transform: uppercase; display: block; }
        .value { font-weight: bold; }
    </style>
</head>
<body>

    <div id="profileDetails">Loading...</div>
    <button onclick="logout()">Logout</button>

    <script>
        const clientDatabase = {
            "9925786588": { "Full Name": "Azim Kalaniya", "Investment": "4000/-" },
            "9574479931": { "Full Name": "Salman Saiyed", "Investment": "25000/-" },
            "7016437834": { "Full Name": "Belim Mahmmad Husen", "Investment": "5,86,990/-" }
        };

        const displayElement = document.getElementById('profileDetails');
        const rawPhone = localStorage.getItem('userPhone');

        if (!rawPhone) {
            displayElement.innerHTML = "No phone number found. Please login.";
        } else {
            const cleanPhone = rawPhone.replace(/\D/g, '').slice(-10);
            const data = clientDatabase[cleanPhone];

            if (data) {
                let html = '<div class="grid">';
                for (let key in data) {
                    html += '<div class="field"><span class="label">' + key + '</span><span class="value">' + data[key] + '</span></div>';
                }
                displayElement.innerHTML = html + '</div>';
            } else {
                displayElement.innerHTML = "No profile found for: " + cleanPhone;
            }
        }

        function logout() {
            localStorage.removeItem('userPhone');
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
