<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Profile</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #f8fafc; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Your Profile</h2>
    <p><strong>Logged in as:</strong> <span id="displayPhone"></span></p>
    <div id="profileDetails">
        <!-- Your specific details will appear here -->
    </div>
    <button onclick="window.location.href='index.html'">Logout</button>
</div>

<script>
    // 1. Get the number from the login page
    const userPhone = localStorage.getItem('userPhone');

    // 2. Display the number
    if (userPhone) {
        document.getElementById('displayPhone').innerText = userPhone;

        // 3. Logic to show your specific profile details
        if (userPhone === "7016437834") {
            document.getElementById('profileDetails').innerHTML = `
                <p>Name: User Name</p>
                <p>Status: Active</p>
                <p>Other Details: Your info goes here</p>
            `;
        } else {
            document.getElementById('profileDetails').innerHTML = "<p>No profile found for this number.</p>";
        }
    } else {
        // If no number is found, go back to login
        window.location.href = "index.html";
    }
</script>

</body>
</html>
