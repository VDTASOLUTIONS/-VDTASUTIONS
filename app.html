<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VDTA Dashboard</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

/* TOP BAR */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 16px;
background:#111827;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
width:35px;
height:35px;
border-radius:10px;
}

.logo h1{
font-size:16px;
}

.logout{
background:#ef4444;
border:none;
color:white;
padding:8px 10px;
border-radius:8px;
cursor:pointer;
font-size:12px;
}

/* GRID */
.container{
padding:15px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
text-align:center;
}

.card h2{
font-size:14px;
}

button{
margin-top:8px;
padding:8px 10px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
cursor:pointer;
font-size:12px;
}

/* PROFILE */
.profile{
background:#1e293b;
margin:15px;
padding:15px;
border-radius:12px;
}

input,textarea{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:8px;
outline:none;
font-size:12px;
}

#trackResult{
margin-top:8px;
color:#22c55e;
font-size:12px;
}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="Image.png">
<h1>VDTA</h1>
</div>

<button class="logout" onclick="logout()">Logout</button>
</header>

<!-- PROFILE -->
<div class="profile">
<h3>Your Profile</h3>

<input id="name" placeholder="Full Name">
<input id="number" placeholder="Phone Number">
<textarea id="address" placeholder="Address + Pincode"></textarea>
<input id="dob" type="date">

<button onclick="saveProfile()">Save</button>

<p id="showProfile"></p>
</div>

<!-- SERVICES -->
<div class="container">

<div class="card">
<h2>Jobs</h2>
<button>Open</button>
</div>

<div class="card">
<h2>Investment</h2>
<button>Open</button>
</div>

<div class="card">
<h2>Payment Status</h2>
<button>Check</button>
</div>

<div class="card">
<h2>Track Payment</h2>

<input id="trackNumber" placeholder="Enter Number">
<button onclick="trackPayment()">Track</button>

<p id="trackResult"></p>
</div>

<div class="card">
<h2>Buy Data</h2>
<button>Buy</button>
</div>

</div>

<script>

// PROFILE SAVE
function saveProfile(){
const data={
name:document.getElementById("name").value,
number:document.getElementById("number").value,
address:document.getElementById("address").value,
dob:document.getElementById("dob").value
};

localStorage.setItem("profile",JSON.stringify(data));
showProfile();
alert("Saved");
}

function showProfile(){
let d=JSON.parse(localStorage.getItem("profile"));
if(d){
document.getElementById("showProfile").innerHTML=
`<b>${d.name}</b><br>${d.number}`;
}
}

// TRACK
function trackPayment(){
let n=document.getElementById("trackNumber").value;
if(!n){
document.getElementById("trackResult").innerText="Enter number";
return;
}
document.getElementById("trackResult").innerHTML=
"Payment progress: <b>75%</b>";
}

// LOGOUT
function logout(){
window.location.href="index.html";
}

showProfile();

</script>

</body>
</html>
