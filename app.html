<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VDTA App</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

/* TOP BAR */
header{
display:flex;
align-items:center;
justify-content:space-between;
padding:12px 18px;
background:#111827;
position:sticky;
top:0;
}

.logo-box{
display:flex;
align-items:center;
gap:10px;
}

.logo-box img{
height:32px;
width:32px;
border-radius:8px;
}

.logo-box h1{
font-size:16px;
margin:0;
}

.logout{
background:#ef4444;
border:none;
color:white;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
font-size:12px;
}

/* GRID */
.container{
padding:15px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:12px;
}

/* CARDS */
.card{
background:#1e293b;
padding:15px;
border-radius:12px;
text-align:center;
transition:0.2s;
}

.card:hover{
transform:scale(1.03);
background:#273449;
}

.card h2{
font-size:14px;
margin-bottom:8px;
}

.card button{
padding:8px 10px;
border:none;
border-radius:8px;
cursor:pointer;
background:#2563eb;
color:white;
font-size:12px;
margin-top:8px;
}

/* PROFILE */
.profile{
background:#1e293b;
padding:15px;
border-radius:12px;
margin:15px;
}

input,textarea{
width:100%;
padding:8px;
margin:5px 0;
border-radius:8px;
border:none;
outline:none;
font-size:12px;
}

#trackResult{
margin-top:8px;
color:#22c55e;
font-size:12px;
}
</style>
</head>

<body>

<header>
<div class="logo-box">
<img src="Image.png" alt="logo">
<h1>VDTA</h1>
</div>

<button class="logout" onclick="logout()">Logout</button>
</header>

<!-- PROFILE -->
<div class="profile">
<h3 style="margin:0 0 10px 0;">Your Profile</h3>

<input id="name" placeholder="Full Name">
<input id="number" placeholder="Phone Number">
<textarea id="address" placeholder="Address + Pincode"></textarea>
<input id="dob" type="date">

<button onclick="saveProfile()">Save Profile</button>

<p id="showProfile"></p>
</div>

<!-- SERVICES -->
<div class="container">

<div class="card">
<h2>Jobs</h2>
<button onclick="alert('Coming Soon')">Open</button>
</div>

<div class="card">
<h2>Investment</h2>
<button onclick="alert('Coming Soon')">Open</button>
</div>

<div class="card">
<h2>Payment Status</h2>
<button onclick="alert('Coming Soon')">Check</button>
</div>

<div class="card">
<h2>Track Payment</h2>
