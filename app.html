<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDTA Dashboard</title>
    <style>
        body { margin:0; font-family:Arial, sans-serif; background:#0b1220; color:white; }
        header { display:flex; justify-content:space-between; align-items:center; padding:12px 16px; background:#111827; }
        .logo { display:flex; align-items:center; gap:10px; }
        .logo img { width:35px; height:35px; border-radius:10px; }
        .logout { background:#ef4444; border:none; color:white; padding:8px 10px; border-radius:8px; cursor:pointer; font-size:12px; }
        .profile { background:#1e293b; margin:15px; padding:15px; border-radius:12px; }
        input, textarea { width:100%; padding:10px; margin:5px 0; border:none; border-radius:8px; outline:none; font-size:12px; box-sizing:border-box; }
        button { margin-top:8px; padding:8px 10px; border:none; border-radius:8px; background:#2563eb; color:white; cursor:pointer; font-size:12px; }
        .container { padding:15px; display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
        .card { background:#1e293b; padding:15px; border-radius:12px; text-align:center; }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <img src="Image.png" alt="Logo">
        <h1>VDTA</h1>
    </div>
    <button class="logout" onclick="logout()">Logout</button>
</header>

<div class="profile">
    <h3>Your Profile</h3>
    <input id="name" placeholder="Full Name">
    <input id="number" placeholder="Phone Number">
    <textarea id="address" placeholder="Address"></textarea>
    <input id="dob" type="date">
    <button onclick="saveProfile()">Save</button>
    <p id="showProfile"></p>
</div>

<div class="container">
    <div class="card">
        <h2>Track Payment</h2>
        <input id="trackNumber" placeholder="Enter Phone Number">
        <button onclick="trackPayment()">Track</button>
    </div>
</div>

<script>
    function saveProfile(){
        const data = {
            name: document.getElementById("name").value,
            number: document.getElementById("number").value,
            address: document.getElementById("address").value,
            dob: document.getElementById("dob").value
        };
        localStorage.setItem("profile", JSON.stringify(data));
        alert("Saved");
    }

    // This is the function that makes it work
    function trackPayment(){
        let n = document.getElementById("trackNumber").value.trim();
        if(!n){
            alert("Please enter a phone number!");
            return;
        }
        // Redirects to profile page with the number
        window.location.href = "profile.html?phone=" + n;
    }

    function logout(){
        window.location.href = "index.html";
    }
</script>

</body>
</html>
