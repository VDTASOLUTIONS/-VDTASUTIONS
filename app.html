<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDTA Solutions | Official Portal</title>
    <style>
        body { 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif; 
            background: #0f172a; 
            color: #f8fafc; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh;
        }
        header { 
            padding: 25px; 
            display: flex; 
            align-items: center; 
            gap: 20px; 
            background: #1e293b; 
            border-bottom: 3px solid #3b82f6; 
        }
        header img { 
            width: 60px; 
            height: 60px; 
            border-radius: 12px; 
            object-fit: cover;
        }
        header h1 { 
            margin: 0; 
            font-size: 24px; 
            letter-spacing: 1px;
            color: #ffffff; 
        }
        .main-container { 
            max-width: 450px; 
            margin: 60px auto; 
            padding: 40px; 
            background: #ffffff; 
            border-radius: 16px; 
            color: #1e293b; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
        }
        h2 { 
            margin-top: 0; 
            color: #0f172a; 
            text-align: center;
        }
        p { 
            color: #64748b; 
            text-align: center; 
            margin-bottom: 30px; 
        }
        input { 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 20px; 
            border: 2px solid #e2e8f0; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px; 
            outline: none;
        }
        input:focus { border-color: #3b82f6; }
        button { 
            width: 100%; 
            padding: 15px; 
            background: #3b82f6; 
            border: none; 
            border-radius: 8px; 
            color: white; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 16px; 
            transition: background 0.3s; 
        }
        button:hover { background: #2563eb; }
    </style>
</head>
<body>

<header>
    <img src="logo.png" alt="Company Logo">
    <h1>VDTA Solutions</h1>
</header>

<div class="main-container">
    <h2>Client Verification</h2>
    <p>Enter the registered 10-digit phone number below.</p>
    <input id="trackNumber" type="number" placeholder="Phone Number">
    <button onclick="trackPayment()">View Profile</button>
</div>

<script>
    function trackPayment(){
        let n = document.getElementById("trackNumber").value.trim();
        if(n.length < 10){ 
            alert("Please enter a valid 10-digit phone number!"); 
            return; 
        }
        window.location.href = "profile.html?phone=" + n;
    }
</script>

</body>
</html>
