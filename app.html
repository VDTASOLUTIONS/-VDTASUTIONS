<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VDTA Dashboard</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
padding:20px;
background:#111827;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
background:#2563eb;
color:white;
margin-top:10px;
}

.logout{
background:red;
}

input, textarea{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:none;
outline:none;
}

.profile-box{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

#trackResult{
margin-top:10px;
color:#22c55e;
font-weight:bold;
}
</style>
</head>

<body>

<header>
<h1>VDTA Dashboard</h1>
<button class="logout" onclick="logout()">Logout</button>
</header>

<div class="container">

<!-- PROFILE -->
<div class="profile-box">
<h2>User Profile</h2>

<input id="name" placeholder="Full Name">
<input id="number" placeholder="Phone Number">
<textarea id="address" placeholder="Address + Pincode"></textarea>
<input id="dob" type="date">

<button onclick="saveProfile()">Save Profile</button>

<p id="showProfile"></p>
</div>

<!-- JOB -->
<div class="card">
<h2>Job Service</h2>
<button onclick="alert('Coming Soon')">Open</button>
</div>

<!-- INVESTMENT -->
<div class="card">
<h2>Investment Service</h2>
<button onclick="alert('Coming Soon')">Open</button>
</div>

<!-- PAYMENT STATUS -->
<div class="card">
<h2>Check Payment Status</h2>
<button onclick="alert('Coming Soon')">Check</button>
</div>

<!-- TRACK PAYMENT -->
<div class="card">
<h2>Track Payment</h2>

<input id="trackNumber" placeholder="Enter Mobile Number">

<button onclick="trackPayment()">Track Payment</button>

<p id="trackResult"></p>
</div>

<!-- BUY DATA -->
<div class="card">
<h2>Buy Data</h2>
<button onclick="alert('Coming Soon')">Buy</button>
</div>

</div>

<script>

// PROFILE SAVE
function saveProfile(){
const profile = {
name: document.getElementById("name").value,
number: document.getElementById("number").value,
address: document.getElementById("address").value,
dob: document.getElementById("dob").value
};

localStorage.setItem("userProfile", JSON.stringify(profile));

alert("Profile Saved!");
showProfile();
}

// SHOW PROFILE
function showProfile(){
const data = JSON.parse(localStorage.getItem("userProfile"));

if(data){
document.getElementById("showProfile").innerHTML =
`
<strong>Name:</strong> ${data.name}<br>
<strong>Number:</strong> ${data.number}<br>
<strong>Address:</strong> ${data.address}<br>
<strong>DOB:</strong> ${data.dob}
`;
}
}

// TRACK PAYMENT (DEMO)
function trackPayment(){
const number = document.getElementById("trackNumber").value;
const result = document.getElementById("trackResult");

if(!number){
result.innerText = "Please enter number";
return;
}

let progress = 75;

result.innerHTML =
`Payment for <b>${number}</b><br>
Your payment progress is <b>${progress}%</b> ⏳`;
}

// LOGOUT
function logout(){
window.location.href = "index.html";
}

// LOAD PROFILE ON START
showProfile();

</script>

</body>
</html>
