<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <title>VData Solutions | Access</title>
    <style>
        /* Modern background animation */
        body { margin: 0; padding: 20px; font-family: 'Poppins', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at center, #8a2be2 0%, #4b0082 100%); }
        .login-box { background: rgba(255, 255, 255, 0.95); padding: 40px; border-radius: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.4); text-align: center; width: 90%; max-width: 400px; position: relative; overflow: hidden; }
        
        /* Decorative Icon */
        .icon-circle { width: 70px; height: 70px; background: #ff007f; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; color: white; font-size: 2rem; box-shadow: 0 0 20px rgba(255, 0, 127, 0.5); }
        
        .brand-title { font-family: 'Great Vibes', cursive; font-size: 3rem; color: #4b0082; margin: 0; line-height: 1.2; }
        .slogan { color: #666; margin-bottom: 30px; font-size: 0.9rem; letter-spacing: 1px; }
        
        input { width: 100%; padding: 15px; margin-bottom: 20px; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 1rem; transition: 0.3s; }
        input:focus { border-color: #ff007f; outline: none; }
        
        button { width: 100%; padding: 15px; background: #4b0082; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        button:hover { background: #ff007f; transform: translateY(-2px); }
        
        .footer-note { font-size: 0.75rem; color: #999; margin-top: 25px; }
    </style>
</head>
<body>

<div class="login-box">
    <div class="icon-circle">🔒</div>
    <h1 class="brand-title">VData Solutions</h1>
    <p class="slogan">Secure Client Access Portal</p>

    <input type="text" id="phoneInput" placeholder="Enter Mobile Number">
    <button onclick="login()">Access My Profile</button>
    
    <p class="footer-note">Unauthorized access is prohibited.</p>
</div>

<script>
    function login() {
        const phone = document.getElementById('phoneInput').value;
        if (phone.length >= 10) {
            localStorage.setItem('userPhone', phone);
            window.location.href = "profile.html";
        } else {
            alert("Please enter a valid mobile number.");
        }
    }
</script>
</body>
</html>
