<!DOCTYPE html>
<html>
<body>
    <input type="tel" id="phone" placeholder="Enter Phone Number">
    <button onclick="login()">Enter Application</button>

    <script>
        function login() {
            const phone = document.getElementById("phone").value;
            if (phone.length > 9) {
                // This simple logic just sends them to your app page
                window.location.href = "app.html";
            } else {
                alert("Please enter a valid number");
            }
        }
    </script>
</body>
</html>
