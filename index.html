<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDTA Solutions | Secure Client Login</title>
    <style>
        body { 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0f172a; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
        }
        .login-card { 
            background: #ffffff; 
            padding: 40px; 
            border-radius: 20px; 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3);
        }
        .login-card img { width: 80px; margin-bottom: 20px; }
        h2 { color: #1e293b; margin-bottom: 10px; }
        p { color: #64748b; margin-bottom: 30px; font-size: 0.9em; }
        input { 
            width: 100%; 
            padding: 14px; 
            margin-bottom: 20px; 
            border: 2px solid #e2e8f0; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 16px; 
        }
        button { 
            width: 100%; 
            padding: 14px; 
            background: #3b82f6; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: background 0.3s;
        }
        button:hover { background: #2563eb; }
    </style>
</head>
<body>

<div class="login-card">
    <img src="logo.png" alt="Logo">
    <h2>Welcome Back</h2>
    <p>Please enter your registered mobile number to access your account.</p>
    
    <input type="number" id="phoneInput" placeholder="Registered Phone Number">
    <button onclick="login()">Access Profile</button>
</div>

<script>
    function login() {
        const phone = document.getElementById("phoneInput").value.trim();
        if (phone.length === 10) {
            window.location.href = "profile.html?phone=" + phone;
        } else {
            alert("Please enter a valid 10-digit phone number.");
        }
    }
</script>

</body>
</html>
