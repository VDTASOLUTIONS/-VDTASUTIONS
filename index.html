<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDTA Solutions | Official Portal</title>
    <style>
        body { 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif; 
            background: #f8fafc; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
        }
        .login-card { 
            background: #ffffff; 
            padding: 50px; 
            border-radius: 24px; 
            width: 100%; 
            max-width: 420px; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        .logo { width: 120px; margin-bottom: 20px; }
        h1 { color: #0f172a; margin: 0; font-size: 28px; font-weight: 700; }
        .slogan { color: #64748b; font-size: 14px; margin-bottom: 30px; }
        
        input { 
            width: 100%; 
            padding: 16px; 
            margin-bottom: 20px; 
            border: 2px solid #e2e8f0; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 16px;
        }
        
        /* Button Container */
        .button-group { display: flex; gap: 10px; }
        
        button { 
            flex: 1; 
            padding: 16px; 
            border: none; 
            border-radius: 12px; 
            font-size: 15px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.3s;
        }
        .btn-login { background: #0f172a; color: white; }
        .btn-login:hover { background: #334155; }
        
        .btn-signup { background: #e2e8f0; color: #0f172a; }
        .btn-signup:hover { background: #cbd5e1; }
    </style>
</head>
<body>

<div class="login-card">
    <img src="logo.png" alt="VDTA Logo" class="logo">
    <h1>VDTA Solutions</h1>
    <p class="slogan">Empowering Your Digital Future</p>
    
    <input type="number" id="phoneInput" placeholder="Enter Mobile Number">
    
    <div class="button-group">
        <button class="btn-login" onclick="login()">Login</button>
        <button class="btn-signup" onclick="signup()">Sign Up</button>
    </div>
</div>

<script>
    function login() {
        const phone = document.getElementById("phoneInput").value.trim();
        if (phone.length === 10) {
            window.location.href = "profile.html?phone=" + phone;
        } else {
            alert("Please enter a valid 10-digit phone number.");
        }
    }

    function signup() {
        // You can change "app.html" to your registration page file name
        window.location.href = "app.html";
    }
</script>

</body>
</html>
