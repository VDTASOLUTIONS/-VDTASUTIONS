<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // EDIT ONLY THE LINES BELOW
        const firebaseConfig = {
            apiKey: "PASTE_YOUR_AIza_KEY_HERE",
            authDomain: "vdta-solutions7.firebaseapp.com",
            projectId: "vdta-solutions7",
            storageBucket: "vdta-solutions7.appspot.com",
            messagingSenderId: "PASTE_YOUR_SENDER_ID",
            appId: "PASTE_YOUR_APP_ID"
        };
        // EDIT ONLY THE LINES ABOVE

        window.auth = getAuth(initializeApp(firebaseConfig));
    </script>
</head>
<body>
    <div id="recaptcha-container"></div>
    <input type="tel" id="phone" placeholder="+91XXXXXXXXXX">
    <button onclick="sendOTP()">Send OTP</button>
    <input type="number" id="otp" placeholder="OTP">
    <button onclick="verifyOTP()">Verify</button>

    <script type="module">
        import { RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        
        window.recaptchaVerifier = new RecaptchaVerifier(window.auth, 'recaptcha-container', { 'size': 'invisible' });

        window.sendOTP = async () => {
            try {
                window.confirmationResult = await signInWithPhoneNumber(window.auth, document.getElementById('phone').value, window.recaptchaVerifier);
                alert("OTP Sent!");
            } catch (e) { alert(e.message); }
        };

        window.verifyOTP = async () => {
            try {
                await window.confirmationResult.confirm(document.getElementById('otp').value);
                window.location.href = "profile.html";
            } catch (e) { alert("Invalid OTP"); }
        };
    </script>
</body>
</html>
