<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDTA Solutions | Official Portal</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // --- PASTE YOUR CONFIG HERE ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        window.auth = auth;
        window.signInWithPhoneNumber = signInWithPhoneNumber;
        window.RecaptchaVerifier = RecaptchaVerifier;
    </script>

    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f8fafc; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        
        .brand-container { margin-bottom: 40px; }
        .logo { width: 150px; margin-bottom: 15px; }
        h1 { color: #0f172a; font-size: 36px; margin: 0; }
        .slogan { color: #64748b; font-size: 18px; margin-top: 5px; }

        .actions { display: flex; gap: 20px; justify-content: center; }
        .btn { padding: 15px 40px; border-radius: 50px; font-weight: 600; cursor: pointer; border: none; font-size: 16px; transition: 0.3s; }
        .btn-login { background: #0f172a; color: white; }
        .btn-signup { background: transparent; color: #0f172a; border: 2px solid #0f172a; }
        
        #loginForm { display: none; margin-top: 40px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        #otp-section { display: none; }
    </style>
</head>
<body>

<div class="brand-container">
    <img src="logo.png" alt="Logo" class="logo">
    <h1>VDTA Solutions</h1>
    <p class="slogan">Your Trusted Partner in Digital Excellence</p>
</div>

<div class="actions" id="actionButtons">
    <button class="btn btn-login" onclick="showLogin()">Login</button>
    <button class="btn btn-signup" onclick="window.location.href='app.html'">Sign Up</button>
</div>

<div id="loginForm">
    <div id="phone-section">
        <input type="tel" id="phoneInput" placeholder="Enter Mobile (e.g., +91XXXXXXXXXX)">
        <button class="btn btn-login" style="width: 100%" onclick="sendOTP()">Send OTP</button>
    </div>

    <div id="otp-section">
        <input type="number" id="otpInput" placeholder="Enter 6-digit OTP">
        <button class="btn btn-login" style="width: 100%" onclick="verifyOTP()">Verify Code</button>
    </div>
    
    <div id="recaptcha-container"></div>
</div>

<script type="module">
    import { RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    window.showLogin = () => {
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('actionButtons').style.display = 'none';
        window.recaptchaVerifier = new RecaptchaVerifier(window.auth, 'recaptcha-container', { 'size': 'invisible' });
    };

    window.sendOTP = async () => {
        const phoneNumber = document.getElementById("phoneInput").value;
        try {
            const confirmationResult = await signInWithPhoneNumber(window.auth, phoneNumber, window.recaptchaVerifier);
            window.confirmationResult = confirmationResult;
            document.getElementById('phone-section').style.display = 'none';
            document.getElementById('otp-section').style.display = 'block';
            alert("OTP Sent to your phone!");
        } catch (error) {
            alert("Error: " + error.message);
        }
    };

    window.verifyOTP = async () => {
        const code = document.getElementById("otpInput").value;
        try {
            await window.confirmationResult.confirm(code);
            window.location.href = "profile.html"; // Success!
        } catch (error) {
            alert("Invalid OTP, please try again.");
        }
    };
</script>

</body>
</html>
